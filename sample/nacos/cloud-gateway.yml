spring:
  security:
    oauth2:
      client:
        provider:
          cloud-auth:
            issuer-uri: http://localhost:9090
        registration:
          cloud:
            provider: cloud-auth
            client-id: cloud
            client-authentication-method: none
            scope:
              - openid
              - profile
  cloud:
    gateway:
      globalcors:
        add-to-simple-url-handler-mapping: true
        cors-configurations:
          '[/**]':
            allowed-origins: '*'
            allowed-methods: '*'
            allowed-headers: '*'
            max-age: 1800
      default-filters:
        - TokenRelay
      routes:
        - id: auth
          uri: lb://cloud-auth
          predicates:
            - Path=/auth/**
          filters:
            - StripPrefix=1
