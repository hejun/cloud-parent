<!DOCTYPE html>
<html lang="zh-Hans" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8"/>
	<meta http-equiv="X-UA-Compatible" content="IE=edge"/>
	<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
	<title>授权</title>
	<link rel="icon" href="data:;">
	<link rel="stylesheet" th:href="@{/style/common.css}">
	<link rel="stylesheet" th:href="@{/style/consent.css}">
</head>
<body>
<p>
	应用
	<label th:text="${client.getClientName() ?: client.getClientId()}"></label>
	想要访问你的账户
	<label th:text="${principal.getName()}"></label>
</p>
<form th:action="@{/oauth2/authorize}" method="post">
	<input type="hidden" name="client_id" th:value="${client.getClientId()}">
	<input type="hidden" name="state" th:value="${state}">
	<div>
		<span>你需授权：</span>
		<div th:each="scope:${requestedScopes}">
			<input type="checkbox" name="scope" th:id="${scope}" th:value="${scope}" checked="checked">
			<label th:for="${scope}" th:text="${scope}"></label>
		</div>
	</div>
	<div th:if="${not #lists.isEmpty(authorizedScopes)}">
		<span>你已授权：</span>
		<div th:each="scope:${authorizedScopes}">
			<input type="checkbox" name="scope" th:id="${scope}" th:value="${scope}" checked="checked"
				   disabled="disabled">
			<label th:for="${scope}" th:text="${scope}"></label>
		</div>
	</div>
	<div>
		<button type="submit">确认授权</button>
	</div>
</form>
</body>
</html>
